<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과 게임 UI + 기능</title>
    <style>
        /* 기본 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Arial', sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* 텍스트 선택 방지 */
        }

        /* 기기 프레임 */
        .tablet-frame {
            background-color: #2ecc71;
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16 / 10;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 10px solid #27ae60;
        }

        /* 메인 게임 영역 */
        .main-container {
            flex-grow: 1;
            display: flex;
            background-image: linear-gradient(#f0fff4 1px, transparent 1px), linear-gradient(90deg, #f0fff4 1px, transparent 1px);
            background-size: 25px 25px;
            background-color: #fff;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #fff;
        }

        /* 사과 그리드 */
        .apple-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(17, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 2px;
            padding: 10px;
        }

        /* 개별 사과 셀 */
        .apple {
            background-color: #e74c3c;
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5vw;
            font-weight: bold;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .apple:hover {
            transform: scale(1.1);
        }

        /* 🍎 드래그 선택 시 스타일 */
        .apple.selected {
            background-color: #ff9ff3;
            border: 3px solid #e056fd;
            box-sizing: border-box;
        }

        /* 🍎 합이 10이 되어 터졌을 때 스타일 */
        .apple.hidden {
            visibility: hidden;
        }

        /* 사이드바 */
        .sidebar {
            width: 80px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            border-left: 2px solid #f0fff4;
        }

        .score {
            color: #27ae60;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .progress-bar-container {
            flex-grow: 1;
            width: 20px;
            background-color: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .progress-bar-fill {
            width: 100%;
            height: 100%;
            background-color: #2ecc71;
            border-radius: 10px;
            transition: height 1s linear;
        }

        /* 하단 컨트롤 바 */
        .footer {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-top: 10px;
        }

        .reset-btn {
            background-color: #2ecc71;
            color: #fff;
            border: none;
            padding: 10px 25px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid #fff;
        }

        .reset-btn:hover { background-color: #27ae60; }
        .controls-group { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; color: #fff; font-size: 18px; }
