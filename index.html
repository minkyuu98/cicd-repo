<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과 게임 (모두 5버전)</title>
    <style>
        /* 기본 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Arial', sans-serif;
            background-color: #e0e6ed; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none; 
        }

        /* 기기 프레임 */
        .tablet-frame {
            background-color: #2ecc71;
            width: 900px;
            height: 550px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 8px solid #27ae60;
        }

        /* 메인 게임 영역 */
        .main-container {
            flex-grow: 1;
            display: flex;
            background-image: linear-gradient(#f0fff4 1px, transparent 1px), linear-gradient(90deg, #f0fff4 1px, transparent 1px);
            background-size: 25px 25px;
            background-color: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #fff;
        }

        /* 사과 그리드 */
        .apple-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(17, 35px); 
            grid-template-rows: repeat(10, 35px);
            justify-content: center;
            align-content: center;
            gap: 5px;
            padding: 10px;
        }

        /* 개별 사과 셀 */
        .apple {
            background-color: #e74c3c;
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .apple:hover {
            transform: scale(1.1);
        }

        /* 🍎 드래그 선택 시 스타일 */
        .apple.selected {
            background-color: #ff9ff3;
            border: 3px solid #e056fd;
            box-sizing: border-box;
        }

        /* 🍎 합이 10이 되어 터졌을 때 스타일 */
        .apple.hidden {
            visibility: hidden;
        }

        /* 사이드바 (점수 & 타이머) */
        .sidebar {
            width: 80px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            border-left: 2px solid #f0fff4;
        }

        .score {
            color: #27ae60;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* 타이머 바깥쪽 통 */
        .progress-bar-container {
            flex-grow: 1;
            width: 15px;
            background-color: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        /* 타이머 차오르는 부분 */
        .progress-bar-fill {
            width: 100%;
            height: 100%; 
            background-color: #2ecc71;
            border-radius: 10px;
            transition: height 1s linear, background-color 0.5s;
        }

        /* 하단 컨트롤 바 */
        .footer {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-top: 10px;
        }

        .reset-btn {
            background-color: #2ecc71;
            color: #fff;
            border: none;
            padding: 8px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid #fff;
        }

        .reset-btn:hover { background-color: #27ae60; }
        .controls-group { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; color: #fff; font-size: 14px; font-weight: bold; }
        .checkbox-container { display: flex; align-items: center; gap: 8px; }
        .checkbox-container input[type="checkbox"] { width: 16px; height: 16px; accent-color: #fff; cursor: pointer; }
        .bgm-controls { display: flex; align-items: center; gap: 8px; }
        .music-note { font-size: 18px; }
        .volume-slider { width: 120px; accent-color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tablet-frame">
        <div class="main-container">
            <div id="apple-grid" class="apple-grid"></div>
            <div class="sidebar">
                <div class="score">0</div>
                <div class="progress-bar-container">
                    <div id="time-bar" class="progress-bar-fill"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="reset-btn" onclick="initGame()">Reset</button>
            <div class="controls-group">
                <div class="checkbox-container">
                    <span>薄い色</span>
                    <input type="checkbox">
                </div>
                <div class="checkbox-container">
                    <div class="bgm-controls">
                        <span class="music-note">♪</span>
                        <input type="checkbox" checked>
                    </div>
                </div>
                <input type="range" class="volume-slider" min="0" max="100" value="50">
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('apple-grid');
        const scoreEl = document.querySelector('.score');
        const timeBar = document.getElementById('time-bar');
        
        const rows = 10;
        const cols = 17;
        const GAME_TIME = 120; // 게임 시간 (초)

        let score = 0;
        let timeLeft = GAME_TIME;
        let timerInterval;
        let isDragging = false;
        let startCell = null;
        let selectedCells = [];

        function initGame() {
            grid.innerHTML = '';
            score = 0;
            scoreEl.textContent = score;
            timeLeft = GAME_TIME;
            isDragging = false;
            
            clearInterval(timerInterval);
            updateTimeBar();
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const apple = document.createElement('div');
                    apple.className = 'apple';
                    apple.dataset.row = r;
                    apple.dataset.col = c;
                    
                    // 👉 여기가 수정된 부분입니다! (랜덤 공식 대신 무조건 5를 넣음)
                    apple.textContent = 5;

                    apple.addEventListener('mousedown', startDrag);
                    apple.addEventListener('mouseenter', drag);
                    grid.appendChild(apple);
                }
            }

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimeBar();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('⏰ 시간이 다 되었습니다! 최종 점수: ' + score + '점');
                }
            }, 1000);
        }

        function updateTimeBar() {
            const percentage = (timeLeft / GAME_TIME) * 100;
            timeBar.style.height = percentage + '%';
            
            if (percentage <= 20) {
                timeBar.style.backgroundColor = '#e74c3c';
            } else {
                timeBar.style.backgroundColor = '#2ecc71';
            }
        }

        document.addEventListener('mouseup', endDrag);

        function startDrag(e) {
            if (timeLeft <= 0) return; 
            isDragging = true;
            startCell = e.target;
            selectArea(startCell, startCell);
        }

        function drag(e) {
            if (!isDragging || timeLeft <= 0) return;
            selectArea(startCell, e.target);
        }

        function selectArea(start, end) {
            clearSelection();
            
            if(!start || !end || !start.classList || !end.classList) return;
            if(!start.classList.contains('apple') || !end.classList.contains('apple')) return;

            const r1 = Math.min(start.dataset.row, end.dataset.row);
            const r2 = Math.max(start.dataset.row, end.dataset.row);
            const c1 = Math.min(start.dataset.col, end.dataset.col);
            const c2 = Math.max(start.dataset.col, end.dataset.col);

            const allCells = document.querySelectorAll('.apple');
            allCells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                if (r >= r1 && r <= r2 && c >= c1 && c <= c2 && !cell.classList.contains('hidden')) {
                    cell.classList.add('selected');
                    selectedCells.push(cell);
                }
            });
        }

        function clearSelection() {
            document.querySelectorAll('.apple.selected').forEach(cell => cell.classList.remove('selected'));
            selectedCells = [];
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;

            let sum = 0;
            selectedCells.forEach(cell => sum += parseInt(cell.textContent));

            if (sum === 10) {
                selectedCells.forEach(cell => cell.classList.add('hidden'));
                score += selectedCells.length;
                scoreEl.textContent = score;
            }

            clearSelection();
        }

        initGame();
    </script>
</body>
</html>
