<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습용 사과 게임 UI</title>
    <style>
        /* 기본 스타일 초기화 및 배경 설정 */
        body {
            font-family: 'Malgun Gothic', 'Arial', sans-serif;
            background-color: #333; /* 어두운 배경으로 기기 프레임 강조 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* 드래그 선택 방지 */
        }

        /* 기기 프레임 */
        .tablet-frame {
            background-color: #2ecc71; /* 밝은 녹색 프레임 */
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16 / 10; /* 화면 비율 설정 */
            border-radius: 40px; /* 둥근 모서리 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* 그림자 효과 */
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 10px solid #27ae60; /* 더 진한 테두리 */
        }

        /* 메인 게임 영역 (그리드 및 사이드바) */
        .main-container {
            flex-grow: 1;
            display: flex;
            background-image: linear-gradient(#f0fff4 1px, transparent 1px), linear-gradient(90deg, #f0fff4 1px, transparent 1px);
            background-size: 25px 25px; /* 모눈종이 배경 효과 */
            background-color: #fff; /* 기본 배경 */
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #fff;
        }

        /* 사과 그리드 */
        .apple-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(17, 1fr); /* 17열 */
            grid-template-rows: repeat(10, 1fr); /* 10행 */
            gap: 2px;
            padding: 10px;
        }

        /* 개별 사과 셀 */
        .apple {
            background-color: #e74c3c; /* 빨간 사과 */
            color: #fff; /* 흰색 숫자 */
            border-radius: 50%; /* 둥근 모양 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5vw; /* 화면 크기에 맞춘 글자 크기 */
            font-weight: bold;
            aspect-ratio: 1 / 1; /* 정사각형 유지 */
            cursor: pointer;
            transition: transform 0.1s;
        }

        .apple:hover {
            transform: scale(1.1); /* 호버 효과 */
        }

        /* 사이드바 (점수 및 진행 바) */
        .sidebar {
            width: 80px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            border-left: 2px solid #f0fff4;
        }

        .score {
            color: #27ae60;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .progress-bar-container {
            flex-grow: 1;
            width: 20px;
            background-color: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: flex-end; /* 아래에서 위로 차오르게 */
        }

        .progress-bar-fill {
            width: 100%;
            height: 100%; /* 진행 상태 (연습용으로 꽉 채움) */
            background-color: #2ecc71; /* 진행 바 색상 */
            border-radius: 10px;
        }

        /* 하단 컨트롤 바 */
        .footer {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-top: 10px;
        }

        /* 리셋 버튼 */
        .reset-btn {
            background-color: #2ecc71;
            color: #fff;
            border: none;
            padding: 10px 25px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid #fff;
        }

        .reset-btn:hover {
            background-color: #27ae60;
        }

        /* 우측 컨트롤러 그룹 */
        .controls-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            color: #fff;
            font-size: 18px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #fff; /* 체크박스 색상 */
        }

        /* BGM 아이콘 및 슬라이더 */
        .bgm-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-note {
            font-size: 24px;
        }

        .volume-slider {
            width: 150px;
            accent-color: #fff; /* 슬라이더 색상 */
        }

    </style>
</head>
<body>

    <div class="tablet-frame">

        <div class="main-container">
            <div id="apple-grid" class="apple-grid">
                </div>

            <div class="sidebar">
                <div class="score">0</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="reset-btn">Reset</button>
            <div class="controls-group">
                <div class="checkbox-container">
                    <span>薄い色</span>
                    <input type="checkbox">
                </div>
                <div class="checkbox-container">
                    <div class="bgm-controls">
                        <span class="music-note">♪</span>
                        <input type="checkbox" checked>
                    </div>
                </div>
                <input type="range" class="volume-slider" min="0" max="100" value="50">
            </div>
        </div>

    </div>

    <script>
        const grid = document.getElementById('apple-grid');
        const rows = 10;
        const cols = 17;

        for (let i = 0; i < rows * cols; i++) {
            const apple = document.createElement('div');
            apple.className = 'apple';
            // 1~9 사이의 랜덤 숫자 생성
            apple.textContent = Math.floor(Math.random() * 9) + 1;
            grid.appendChild(apple);
        }
    </script>

</body>
</html>
